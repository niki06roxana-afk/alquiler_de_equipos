{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Alquiler de Equipos Tecnológicos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<div class="container mt-4">

    <nav class="navbar navbar-expand-lg mb-4">

        <div class="container-fluid">

            <a class="navbar-brand fw-bold" href="/inicio/">
                💻 Sistema de Alquiler de Equipos
            </a>

            <div class="menu">

                <a href="/inicio/" class="menu-btn {% if request.path == '/inicio/' %}activo inicio{% endif %}">
                    🏠 Inicio
                </a>

                <a href="/productos/" class="menu-btn {% if request.path == '/productos/' %}activo equipos{% endif %}">
                    💻 Equipos
                </a>

                <a href="/carrito/" class="menu-btn {% if request.path == '/carrito/' %}activo solicitud{% endif %}">
                    📝 Solicitud
                </a>

                <a href="/mis-pedidos/" class="menu-btn {% if request.path == '/mis-pedidos/' %}activo pedidos{% endif %}">
                    📦 Mis Alquileres
                </a>

                <a href="{% url 'reporte_ventas' %}" class="menu-btn {% if request.resolver_match.url_name == 'reporte_ventas' %}activo reporte{% endif %}">
                    📊 Reporte
                </a>

            </div>

        </div>

    </nav>

    {% if messages %}
        {% for message in messages %}

            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>

        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
